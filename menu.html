<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu - The Golden Fork</title>
    
    <style>
        /* Modern Minimalist Luxury Theme (Synced Across Site) */
        :root {
            --primary-green: #1e3527; /* Darker Luxury Forest Green */
            --accent-sage: #7a8f7c;   /* Refined Sage */
            --bg-cream: #fbf8f3;      /* Ultra Premium Soft Cream */
            --text-dark: #222222;
            --text-muted: #5a655d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar - Premium Minimalist */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 35px 8%;
            background: transparent;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-green);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.4s ease;
        }

        nav ul li a:hover {
            background-color: rgba(45, 71, 57, 0.06);
            color: var(--primary-green);
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 40px auto 100px auto;
            padding: 0 5%;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 5vw, 3.8rem);
            color: var(--primary-green);
            text-align: center;
            margin-bottom: 60px;
            opacity: 0;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        /* Luxury Menu Layout */
        .menu-list { 
            max-width: 650px; 
            margin: 0 auto; 
            text-align: left; 
            opacity: 0;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards;
        }

        /* Premium Dotted Leader Line Style */
        .item { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end;
            padding: 20px 15px; 
            margin-bottom: 10px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        /* Classy hover effect for menu dishes */
        .item:hover {
            background-color: rgba(45, 71, 57, 0.03);
            transform: translateX(5px);
        }

        .dish-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--primary-green);
            white-space: nowrap;
            padding-right: 10px;
        }

        /* Connecting dots between name and price */
        .dots {
            flex-grow: 1;
            border-bottom: 2px dotted rgba(122, 143, 124, 0.4);
            margin-bottom: 5px;
        }

        .price { 
            font-family: 'Inter', sans-serif;
            font-weight: 600; 
            font-size: 1.15rem;
            color: var(--primary-green); 
            padding-left: 10px;
        }

        /* Keyframes */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 25px; padding: 25px 5%; }
            nav ul { gap: 5px; }
            nav ul li a { padding: 8px 12px; font-size: 0.75rem; }
            h1 { font-size: 2.3rem; margin-bottom: 40px; }
            .dish-name { font-size: 1.1rem; }
            .price { font-size: 1rem; }
            .item { padding: 15px 10px; }
        }
    </style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navigation -->
    <nav> 
        <div class="logo">The Golden Fork</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <section class="container">
        <h1>Our Menu</h1>
        
        <div class="menu-list">
            <div class="item">
                <span class="dish-name">Paneer Tikka</span> 
                <span class="dots"></span>
                <span class="price">₹250</span>
            </div>
            <div class="item">
                <span class="dish-name">Butter Chicken</span> 
                <span class="dots"></span>
                <span class="price">₹380</span>
            </div>
            <div class="item">
                <span class="dish-name">Veg Biryani</span> 
                <span class="dots"></span>
                <span class="price">₹220</span>
            </div>
            <div class="item">
                <span class="dish-name">Dal Makhani</span> 
                <span class="dots"></span>
                <span class="price">₹180</span>
            </div>
        </div>
    </section>

</body>
</html>
