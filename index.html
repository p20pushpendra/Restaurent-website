<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Fork | Organic Elegance</title>
    
    <style>
        /* Modern Minimalist Luxury Theme */
        :root {
            --primary-green: #1e3527; /* Darker Luxury Forest Green */
            --accent-sage: #7a8f7c;   /* Refined Sage */
            --bg-cream: #fbf8f3;      /* Ultra Premium Soft Cream */
            --text-dark: #222222;
            --text-muted: #5a655d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Navbar - Premium Minimalist */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 35px 8%;
            background: transparent;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-green);
            letter-spacing: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        nav ul li a {
            text-decoration: none;
            color: var(--text-dark);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px 20px;
            border-radius: 50px;
            transition: all 0.4s ease;
        }

        /* Hover pill effect */
        nav ul li a:hover {
            background-color: rgba(45, 71, 57, 0.06);
            color: var(--primary-green);
        }

        /* Container & Content */
        .container {
            max-width: 1200px;
            margin: 40px auto 60px auto;
            padding: 0 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 6.5vw, 4.8rem);
            color: var(--primary-green);
            margin-bottom: 25px;
            line-height: 1.15;
            letter-spacing: -0.5px;
            opacity: 0;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        h1 i {
            font-weight: 400;
            color: var(--accent-sage);
        }

        p {
            font-size: 1.15rem;
            color: var(--text-muted);
            max-width: 650px;
            margin-bottom: 60px;
            line-height: 1.9;
            font-weight: 400;
            opacity: 0;
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards;
        }

        /* Image Showcase with Premium Shadow & Floating Card */
        .image-wrapper {
            position: relative;
            width: 100%;
            max-width: 750px;
            opacity: 0;
            animation: scaleUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) 0.6s forwards;
        }

        .image-container {
            position: relative;
            overflow: hidden;
            border-radius: 40px 10px 40px 10px; /* Elegant asymmetric corners */
            box-shadow: 0 30px 70px rgba(45, 71, 57, 0.15);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.6s ease;
        }

        .restaurant-img {
            width: 100%;
            display: block;
            transition: transform 0.8s ease;
        }

        /* Floating Luxury Badge */
        .floating-badge {
            position: absolute;
            bottom: -25px;
            right: 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: left;
            z-index: 10;
            transition: transform 0.5s ease;
        }

        .floating-badge span {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
            display: block;
        }

        .floating-badge small {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-sage);
            font-weight: 600;
        }

        /* Elegant Footer Style */
        footer {
            text-align: center;
            padding: 40px 20px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 500;
        }

        footer span {
            color: var(--primary-green);
            font-weight: 600;
        }

        /* Hover Interactions */
        .image-wrapper:hover .image-container {
            transform: translateY(-10px);
            box-shadow: 0 45px 85px rgba(45, 71, 57, 0.22);
        }

        .image-wrapper:hover .restaurant-img {
            transform: scale(1.04);
        }

        .image-wrapper:hover .floating-badge {
            transform: translateY(-5px) scale(1.02);
        }

        /* Smooth Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.97); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 25px; padding: 25px 5%; }
            nav ul { gap: 5px; }
            nav ul li a { padding: 8px 15px; font-size: 0.75rem; }
            h1 { font-size: 2.6rem; }
            p { font-size: 1rem; margin-bottom: 40px; }
            .floating-badge { right: 20px; bottom: -20px; padding: 15px 25px; }
            .floating-badge span { font-size: 1.2rem; }
            footer { font-size: 0.7rem; letter-spacing: 1.5px; }
        }
    </style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>
